name: Keep Haul API Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl health endpoint
        env:
          HAUL_API_URL: ${{ vars.HAUL_API_URL || 'https://rana-m-ahmed-haulbackend.hf.space' }}
        run: |
          curl --fail --show-error --silent --max-time 20 "$HAUL_API_URL/health"
