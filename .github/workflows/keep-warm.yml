name: Keep Hual API Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl health endpoint
        env:
          HUAL_API_URL: ${{ vars.HUAL_API_URL || 'https://hual-api.hf.space' }}
        run: |
          curl --fail --show-error --silent --max-time 20 "$HUAL_API_URL/health"
